<link rel="stylesheet" href="data.css"/>

<div class="data-shell">

<!-- MAP SIDE (FULL SCREEN) -->
<div class="data-map-side">
  <div class="data-map-wrap">
    <div id="data-map"></div>
  </div>
</div>

<!-- HERO OVERLAY (CENTERED ON MAP) -->
<div class="data-scroll">

<!-- HERO -->
<section class="data-hero">
  <div class="data-hero-inner">
    <div class="data-tag">
      // Regional Geospatial Data
    </div>
    <h1 class="data-title">
      <span>KABUPATEN</span>
      <span>POLEWALI</span>
      <span>MANDAR</span>
    </h1>
  </div>
</section>

</div>

</div>

<!-- INFO BLOCKS SECTION -->
<section class="info-section">

  <div class="info-layout">

    <!-- LEFT -->
    <div class="info-stack">

      <div class="info-block reveal">
        <div class="info-number" data-target="16">0</div>
        <div class="info-label">Kecamatan</div>
      </div>

      <div class="info-block reveal">
        <div class="info-number" data-target="23">0</div>
        <div class="info-label">Kelurahan</div>
      </div>

      <div class="info-block reveal">
        <div class="info-number" data-target="173">0</div>
        <div class="info-label">Desa</div>
      </div>

    </div>

    <!-- RIGHT -->
    <div class="district-map-shell reveal">

      <div class="subdistrict-display data-subdistrict-display reveal">
        <div class="subdistrict-label">SUBDISTRICT</div>
        <div class="subdistrict-name" id="subdistrict-name">—</div>
      </div>

      <div id="district-map"></div>

    </div>

  </div>

</section>

<script src="data.js"></script>
