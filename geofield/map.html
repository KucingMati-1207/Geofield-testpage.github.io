<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GEOFIELD // Maps</title>
  <link rel="stylesheet" href="main.css"/>
  <link rel="stylesheet" href="transition.css"/>
  <link
  href="https://unpkg.com/maplibre-gl@5.3.0/dist/maplibre-gl.css"
  rel="stylesheet"
/>
<script src="https://unpkg.com/maplibre-gl@5.3.0/dist/maplibre-gl.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
</head>
<body class="map-page">

<div class="scanlines"></div>

<nav id="navbar">

  <a href="index.html" class="nav-logo">

      <polygon points="14,2 26,8 26,20 14,26 2,20 2,8" stroke="#FDDB3A" stroke-width="1.5" fill="none"/>
      <circle cx="14" cy="14" r="3" fill="#FDDB3A"/>
      <line x1="14" y1="2" x2="14" y2="11" stroke="#FDDB3A" stroke-width="1" opacity="0.5"/>
      <line x1="14" y1="17" x2="14" y2="26" stroke="#FDDB3A" stroke-width="1" opacity="0.5"/>
      <line x1="2" y1="8" x2="11" y2="13" stroke="#FDDB3A" stroke-width="1" opacity="0.5"/>
      <line x1="17" y1="15" x2="26" y2="20" stroke="#FDDB3A" stroke-width="1" opacity="0.5"/>
      <line x1="26" y1="8" x2="17" y2="13" stroke="#FDDB3A" stroke-width="1" opacity="0.5"/>
      <line x1="11" y1="15" x2="2" y2="20" stroke="#FDDB3A" stroke-width="1" opacity="0.5"/>
    </svg>

    <span class="nav-logo-text">
      GEO<span>FIELD</span>
    </span>

  </a>

  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="map.html" class="active">Maps</a></li>
    <li><a href="data.html">Data</a></li>
    <li><a href="about.html">About Us</a></li>
  </ul>
<div class="nav-actions">
  <button
    id="language-toggle"
    class="language-btn"
  >
    LOK
  </button>
  <button id="theme-toggle" class="theme-btn">◐</button>
</div>

</nav>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div id="world">

  <div class="bg-grid"></div>

  <div class="map-shell">

    <div id="map"></div>
<div class="map-categories">

  <button class="map-filter" data-category="cultural">
    <span>CULTURAL</span>
  </button>

  <button class="map-filter" data-category="culinary">
    <span>CULINARY</span>
  </button>

  <button class="map-filter" data-category="nature">
    <span>NATURE</span>
  </button>

  <button class="map-filter" data-category="hangout">
    <span>HANGOUT</span>
  </button>

</div>
<div class="map-search-container">
      <input type="text" id="map-search" class="map-search-input" placeholder="SEARCH ..." autocomplete="off">
      <div id="search-results" class="search-results-box"></div>
    </div>
<button class="map-view-toggle" id="view-toggle">
      <span>2D MODE</span>
    </button>
    <div class="map-overlay">

      <div class="overlay-title">
        Polewali Mandar District
      </div>

      <div class="overlay-sub">
        SUB-DISTRICT SCALE //
      </div>

    </div>

    <div class="subdistrict-overlay" id="subdistrict-layer">
      <div class="subdistrict-label">SUBDISTRICT</div>
      <div class="subdistrict-name" id="subdistrict-name">—</div>
    </div>

    <div class="map-coords" id="coords" style="display: none;">
      LAT 0.00000 — LNG 0.00000
    </div>

  </div>

</div>

<div class="cursor-dot"></div>
<div class="cursor-ring"></div>

<!-- Marker Hover Platform -->
<div class="marker-hover-platform" id="marker-platform">
  <div class="platform-card">
    <img class="platform-image" id="platform-image" src="" alt="Image not found" />
    <div class="platform-content">
      <div class="platform-name" id="platform-name">Location Name</div>
      <div class="platform-category" id="platform-category">Category</div>
      <div class="platform-coords">
        <div class="platform-coord-item">
          Latitude: <span class="platform-coord-value" id="platform-lat">0.00000</span>
        </div>
        <div class="platform-coord-item">
          Longitude: <span class="platform-coord-value" id="platform-lng">0.00000</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>

document.body.classList.add('map-static');

</script>
<script src="main_script.js"></script>
<script src="mapdata.js"></script>
<script src="map_script.js"></script>
<script src="transition.js"></script>
<!-- LANGUAGE MODAL -->

<div
  class="lang-modal"
  id="lang-modal"
>

  <div class="lang-panel">

    <div
      class="lang-title"
      id="lang-title"
    >
      Mauki pakai bahasa apa?
    </div>

    <div class="lang-options">

      <button
        class="lang-option"
        data-lang="lokal"
      >
        Lokal (Coming soon)
      </button>

      <button
        class="lang-option"
        data-lang="english"
      >
        English
      </button>
    </div>
    <button
  class="lang-confirm"
  id="lang-confirm"
>
  Okemi
</button>

  </div>

</div>
</body>
</html>
